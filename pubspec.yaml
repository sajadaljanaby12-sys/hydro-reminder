name: hydro_reminder
description: "تطبيق تذكير بشرب الماء - Hydro Reminder"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # إدارة الحالة
  provider: ^6.1.2

  # التخزين المحلي
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # الإشعارات المحلية
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.2

  # الرسوم البيانية
  fl_chart: ^0.68.0

  # الترجمة والتنسيق
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  # عند إضافة ملفات صوت مخصصة إلى assets/sounds/ فعّل السطرين التاليين:
  # assets:
  #   - assets/sounds/
